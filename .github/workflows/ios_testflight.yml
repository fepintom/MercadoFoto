name: iOS → TestFlight

on:
  push:
    branches: [refactor/app-architecture-v1]

jobs:
  build:
    runs-on: macos-latest

    steps:
      # 1. Código fuente
      - uses: actions/checkout@v4

      # 2. Flutter
      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      # 3. Dependencias Flutter
      - name: Flutter pub get
        working-directory: app
        run: flutter pub get

      # 4. Build number automático (usa el número de run de GitHub)
      - name: Set build number
        working-directory: app
        run: |
          BUILD=$(( 100 + ${{ github.run_number }} ))
          sed -i '' "s/^version: .*/version: 1.0.0+$BUILD/" pubspec.yaml
          echo "Build number: $BUILD"

      # 5. Instalar certificado de distribución
      - name: Install certificate
        env:
          CERTIFICATE_P12: ${{ secrets.CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
        run: |
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          echo "$CERTIFICATE_P12" | base64 --decode > certificate.p12
          security import certificate.p12 -k build.keychain \
            -P "$CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "" build.keychain

      # 6. Instalar provisioning profile
      - name: Install provisioning profile
        env:
          PROVISIONING_PROFILE: ${{ secrets.PROVISIONING_PROFILE }}
        run: |
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          echo "$PROVISIONING_PROFILE" | base64 --decode \
            > ~/Library/MobileDevice/Provisioning\ Profiles/okventa.mobileprovision

      # 7. Build IPA
      - name: Build IPA
        working-directory: app
        run: flutter build ipa --release

      # 8. Subir a TestFlight
      - name: Upload to TestFlight
        uses: apple-actions/upload-testflight-build@v1
        with:
          app-path: app/build/ios/ipa/mercadofoto_app.ipa
          issuer-id: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          api-key-id: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          api-private-key: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
